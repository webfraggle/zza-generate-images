<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link gesendet — Zugzielanzeiger</title>
  <link rel="stylesheet" href="https://use.typekit.net/ldx6jxj.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="form-page">

<div class="form-card form-card-centered">
  <span class="sent-icon">✉️</span>
  <h1>Link gesendet</h1>

  <p class="form-desc">
    Falls die E-Mail-Adresse korrekt ist, erhältst du in Kürze einen Editier-Link
    für das Template <strong>{{.}}</strong>.
  </p>

  <p class="form-note">
    Der Link ist für die konfigurierte Dauer gültig. Schau auch im Spam-Ordner nach.
  </p>

  <a href="/" class="form-link">← Zurück zur Galerie</a>
</div>
<span class="app-version">{{appVersion}}</span>
</body>
</html>
