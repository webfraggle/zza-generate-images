<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Meta.Name}}{{.Meta.Name}}{{else}}{{.Name}}{{end}} — Zugzielanzeiger</title>
  <link rel="stylesheet" href="https://use.typekit.net/ldx6jxj.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <span class="brand">{{if .Meta.Name}}{{.Meta.Name}}{{else}}{{.Name}}{{end}}</span>
    <nav class="header-nav">
      <a href="/" class="nav-link">Galerie</a>
      <a href="/{{.Name}}/edit" class="nav-link active">Vorschau</a>
    </nav>
  </header>
  <main class="editor">
    <div class="editor-pane">
      <span class="pane-label">JSON-Daten</span>
      <textarea id="json-input" spellcheck="false">{{.DefaultJSON}}</textarea>
      <div id="error-msg" class="error"></div>
    </div>
    <div class="preview-pane">
      <span class="pane-label">Vorschau</span>
      <div class="preview-card">
        <div id="spinner" class="spinner" style="display:none"></div>
        <div class="preview-halves" id="preview-halves" style="display:none">
          <canvas id="canvas-top"></canvas>
          <canvas id="canvas-bottom"></canvas>
        </div>
      </div>
    </div>
  </main>
  <script>
    const templateName = "{{.Name}}";
    const textarea    = document.getElementById("json-input");
    const errorMsg    = document.getElementById("error-msg");
    const spinner     = document.getElementById("spinner");
    const halves      = document.getElementById("preview-halves");
    const canvasTop   = document.getElementById("canvas-top");
    const canvasBot   = document.getElementById("canvas-bottom");
    let currentURL    = null;
    let debounce;

    function drawSplit(src) {
      const img = new Image();
      img.onload = () => {
        const w  = img.naturalWidth;
        const h  = img.naturalHeight;
        const h1 = Math.floor(h / 2);
        const h2 = h - h1;

        canvasTop.width  = w;  canvasTop.height  = h1;
        canvasBot.width  = w;  canvasBot.height  = h2;

        canvasTop.getContext("2d").drawImage(img, 0,  0, w, h1, 0, 0, w, h1);
        canvasBot.getContext("2d").drawImage(img, 0, h1, w, h2, 0, 0, w, h2);

        halves.style.display = "flex";
        spinner.style.display = "none";
      };
      img.src = src;
    }

    textarea.addEventListener("input", () => {
      clearTimeout(debounce);
      debounce = setTimeout(render, 600);
    });

    async function render() {
      let body;
      try {
        body = JSON.stringify(JSON.parse(textarea.value));
        errorMsg.textContent = "";
      } catch (e) {
        errorMsg.textContent = "Ungültiges JSON: " + e.message;
        return;
      }

      spinner.style.display = "block";
      halves.style.display  = "none";

      try {
        const resp = await fetch("/" + templateName + "/render", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: body,
        });
        if (!resp.ok) {
          const text = await resp.text();
          errorMsg.textContent = "Fehler " + resp.status + ": " + text.trim();
          spinner.style.display = "none";
          return;
        }
        const blob   = await resp.blob();
        const oldURL = currentURL;
        currentURL   = URL.createObjectURL(blob);
        drawSplit(currentURL);
        if (oldURL) URL.revokeObjectURL(oldURL);
      } catch (e) {
        errorMsg.textContent  = "Netzwerkfehler: " + e.message;
        spinner.style.display = "none";
      }
    }

    {{if .HasDefault}}
    drawSplit("/{{.Name}}/preview");
    spinner.style.display = "block";
    {{end}}
  </script>
</body>
</html>
