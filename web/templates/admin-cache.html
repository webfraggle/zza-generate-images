<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cache — Admin — Zugzielanzeiger</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="admin-page">

<header class="editor-header">
  <a href="/admin">← Übersicht</a>
  <h1>Cache</h1>
  <form method="POST" action="/admin/logout" style="margin:0">
    <button type="submit" class="btn btn-sm">Abmelden</button>
  </form>
</header>

<main class="admin-main">
  <table class="admin-table" style="max-width:400px">
    <tbody>
      <tr><th>Verzeichnis</th><td><code>{{.Stats.Dir}}</code></td></tr>
      <tr><th>Dateien</th><td>{{.Stats.FileCount}}</td></tr>
      <tr><th>Größe</th><td>{{formatBytes .Stats.TotalBytes}}</td></tr>
    </tbody>
  </table>

  <form method="POST" action="/admin/cache/flush" style="margin-top:1.5rem"
        onsubmit="return confirm('Cache wirklich leeren?')">
    <button type="submit" class="btn btn-danger">Cache leeren</button>
  </form>
</main>

</body>
</html>
