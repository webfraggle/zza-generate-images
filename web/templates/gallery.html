<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zugzielanzeiger — Templates</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <h1>Zugzielanzeiger</h1>
    <p>Template-Galerie</p>
  </header>
  <main class="gallery">
    {{range .}}
    <a class="card" href="/{{.Name}}">
      {{if .HasDefault}}
      <img src="/{{.Name}}/preview" alt="{{.Meta.Name}} Vorschau" loading="lazy">
      {{else}}
      <div style="height:80px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:.8rem">Keine Vorschau</div>
      {{end}}
      <div class="card-info">
        <strong>{{if .Meta.Name}}{{.Meta.Name}}{{else}}{{.Name}}{{end}}</strong>
        <span>{{.Meta.Description}}</span>
      </div>
    </a>
    {{else}}
    <p style="padding:24px;color:#888">Keine Templates gefunden.</p>
    {{end}}
  </main>
</body>
</html>
