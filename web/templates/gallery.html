<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zugzielanzeiger — Templates</title>
  <link rel="stylesheet" href="https://use.typekit.net/ldx6jxj.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <span class="brand">Zugzielanzeiger</span>
    <span class="header-divider">|</span>
    <span class="header-section">Templates</span>
  </header>
  <main class="gallery">
    {{range .}}
    <a class="card" href="/{{.Name}}">
      <div class="card-preview">
        {{if .HasDefault}}
        <img src="/{{.Name}}/preview" alt="{{.Meta.Name}} Vorschau" loading="lazy">
        {{else}}
        <span class="card-no-preview">Keine Vorschau</span>
        {{end}}
      </div>
      <div class="card-info">
        <strong class="card-name">{{if .Meta.Name}}{{.Meta.Name}}{{else}}{{.Name}}{{end}}</strong>
        {{if .Meta.Description}}<span class="card-desc">{{.Meta.Description}}</span>{{end}}
        <span class="card-id">{{.Name}}</span>
      </div>
    </a>
    {{else}}
    <p style="padding:24px;color:var(--mid)">Keine Templates gefunden.</p>
    {{end}}
  </main>
</body>
</html>
