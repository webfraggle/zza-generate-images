<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin-Login — Zugzielanzeiger</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="form-page">

<div class="form-card">
  <h1>Admin-Login</h1>

  {{if .Error}}
  <p class="error-text">{{.Error}}</p>
  {{end}}

  <form method="POST" action="/admin/login" autocomplete="off">
    <label for="token">Admin-Token</label>
    <input type="password" id="token" name="token" required autofocus placeholder="Langer Admin-Token">

    <label for="totp">TOTP-Code</label>
    <input type="text" id="totp" name="totp" required
           inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
           placeholder="6-stelliger Code">

    <button type="submit" class="btn btn-primary">Anmelden</button>
  </form>
</div>

</body>
</html>
