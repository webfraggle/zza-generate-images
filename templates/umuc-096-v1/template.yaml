  - type: text
    if: "not(isEmpty(zug3.zeit))"
    value: "{{zug3.zeit}}"
    x: 97
    y: 149
    font: regular
    size: 9
    color: "#ffffff"
    align: right

  # Duplizieren (komplexe Spiegelung)
  # PHP: imagecopy($bg,$bg,62,15,0,95,98,62) = src(0,95,98,62) → dst(62,15)
  - type: copy
    src_x: 0
    src_y: 95
    src_width: 98
    src_height: 62
    x: 62
    y: 15

  # PHP: imagecopy($bg,$bg,0,13,106,93,54,67) = src(106,93,54,67) → dst(0,13)
  - type: copy
    src_x: 106
    src_y: 93
    src_width: 54
    src_height: 67
    x: 0
    y: 13
