    x: 1
    y: 139
  - type: image
    if: "equals(zug3.nr, 'U3')"
    file: U3.png
    x: 1
    y: 139
  - type: image
    if: "equals(zug3.nr, 'U4')"
    file: U4.png
    x: 1
    y: 139
  - type: image
    if: "equals(zug3.nr, 'U5')"
    file: U5.png
    x: 1
    y: 139
  - type: image
    if: "equals(zug3.nr, 'U6')"
    file: U6.png
    x: 1
    y: 139
  - type: image
    if: "equals(zug3.nr, 'U7')"
    file: U7.png
    x: 1
