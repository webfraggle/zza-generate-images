meta:
  title: Node-Editor Test
  canvas:
    width: 320
    height: 80
    colors: 32
fonts:
  - id: bold
    file: NimbusSanL-Bol.otf
  - id: regular
    file: NimbusSanL-Reg.otf
  - id: regular2
    file: NimbusSanL-Reg.otf
layers:
  - type: rect
    x: 0
    "y": 0
    width: 320
    height: 80
    color: "#1a1a2e"
  - type: image
    file: bg.png
    x: 4
    "y": 4
    width: 24
    height: 24
  - type: rect
    x: 0
    "y": 0
    width: 10
    height: 10
    color: "#ff0000"
  - type: text
    value: "{{station}}"
    x: 32
    "y": 6
    font: bold
    size: 12
    color: "#ffffff"
  - type: copy
    src_x: 0
    src_y: 0
    src_width: 32
    src_height: 32
    x: 280
    "y": 0
  - type: loop
    value: "{{trains}}"
    split_by: "|"
    var: zug
    max_items: 4
    layers:
      - type: text
        value: "{{zug}}"
        x: 4
        "y": "{{i * 16 + 21}}"
        font: regular
        size: 10
        color: "#aaaacc"
      - type: text
        value: "{{zug}}"
        x: 100
        "y": "{{i * 16 + 21}}"
        font: regular
        size: 10
        color: "#aaaacc"
  - type: copy
    src_x: 0
    src_y: 0
    src_width: 32
    src_height: 32
    x: 280
    "y": 40
  - type: rect
    x: 15
    "y": 30
    width: 5
    height: 5
    color: "#00ff7b"
