meta:
  name: "Node Editor Test"
  description: "Einfaches Template zum Testen des Node-Editors"
  author: "test"
  version: "1.0"
  canvas:
    width: 160
    height: 80

fonts:
  - id: regular
    file: NimbusSanL-Reg.otf

layers:
  - type: image
    file: bg.png
    x: 0
    y: 0
  - type: text
    value: "{{zug1.zeit}}"
    x: 5
    y: 10
    font: regular
    size: 16
    color: "#000000"
    align: left
  - type: loop
    value: "{{zug1.via}}"
    split_by: "|"
    var: "item"
    max_items: 5
    layers:
      - type: text
        value: "{{item}}"
        x: 5
        y: "{{i * 12 + 30}}"
        font: regular
        size: 10
        color: "#888888"
