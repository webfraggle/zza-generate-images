meta:
  name: "SBB 0.96\""
  description: "Schweizer Bundesbahnen, 0.96 Zoll Display"
  author: "christoph"
  version: "1.0"
  canvas:
    width: 160
    height: 160

fonts:
  - id: bold
    file: NimbusSanL-Bol.otf
  - id: regular
    file: NimbusSanL-Reg.otf
  - id: italic
    file: NimbusSanL-RegIta.otf

layers:
  # Hintergrundbild — aktivieren sobald bg.png vorhanden
  - type: image
    file: bg.png
    x: 0
    y: 0

  # Hintergrund (Platzhalter bis bg.png vorhanden)
  # - type: rect
  #   x: 0
  #   y: 0
  #   width: 160
  #   height: 80
  #   color: "#132a9b"

  # # Header-Balken
  # - type: rect
  #   x: 0
  #   y: 0
  #   width: 160
  #   height: 10
  #   color: "#0d1f6e"

  # --- Abfahrtszeit ---
  - type: text
    value: "{{zug1.zeit}}"
    x: 3
    y: 10
    font: bold
    size: 16
    color: "#ffffff"
    align: left

  # --- Zugnummer ---
  - type: text
    value: "{{zug1.nr}}"
    x: 49
    y: 11
    font: regular
    size: 11
    color: "#ffffff"
    align: left

  - type: rect
    x: 3
    y: 10
    width: 80
    height: 60
    color: "#ff0000"
  # --- Ziel (vonnach) ---
  - type: text
    value: "{{zug1.vonnach}}"
    x: 3
    y: 10
    font: regular
    size: 16
    color: "#ffffff"
    align: left
    width: 80
    height: 60
    valign: bottom

  # --- Hinweis ---
  # Phase 1: immer angezeigt — Phase 2 ergänzt: roten Hintergrund + nur wenn nicht leer
  - type: text
    value: "{{zug1.hinweis}}"
    x: 3
    y: 53
    font: regular
    size: 11
    color: "#ffffff"
    align: left
    max_width: 74

  # --- Obere Hälfte auf untere Hälfte spiegeln ---
  - type: copy
    src_x: 0
    src_y: 0
    src_width: 160
    src_height: 80
    x: 0
    y: 81
