meta:
  name: "SBB 0.96\""
  description: "Schweizer Bundesbahnen, 0.96 Zoll Display"
  author: "christoph"
  version: "1.0"
  canvas:
    width: 160
    height: 160

fonts:
  - id: bold
    file: NimbusSanL-Bol.otf
  - id: regular
    file: NimbusSanL-Reg.otf
  - id: italic
    file: NimbusSanL-RegIta.otf

layers:
  # Hintergrund
  - type: image
    file: bg.png
    x: 0
    y: 0

  # Abfahrtszeit (nur wenn nicht infoOnly)
  - type: text
    if: "not(isEmpty(zug1.vonnach))"
    value: "{{zug1.zeit}}"
    x: 3
    y: 10
    font: bold
    size: 11
    color: "#ffffff"
    align: left

  # Verspätung (gelb), nur wenn > 0 und kein Hinweis
  - type: text
    if: "greaterThan(zug1.abw, 0)"
    value: "+{{zug1.abw}}'"
    x: 45
    y: 24
    font: bold
    size: 11
    color: "#fff048"
    align: left

  # Hinweis-Hintergrund (rot) mit normalen Infos
  - type: rect
    if: "not(isEmpty(zug1.hinweis))"
    x: 2
    y: 52
    width: 77
    height: 19
    color: "#ff0000"

  # Hinweis-Text
  - type: text
    if: "not(isEmpty(zug1.hinweis))"
    value: "{{zug1.hinweis}}"
    x: 3
    y: 53
    font: regular
    size: 7
    color: "#ffffff"
    align: left
    max_width: 74

  # Ziel (vonnach)
  - type: text
    if: "not(isEmpty(zug1.vonnach))"
    value: "{{zug1.vonnach}}"
    x: 3
    y: 51
    font: regular
    size: 11
    color: "#ffffff"
    align: left
    max_width: 74

  # Via-Linie (gepunktete Linie)
  - type: image
    if: "not(isEmpty(zug1.via))"
    file: dottet-line.png
    x: 86
    y: 8

  # Via-Stationen (in Schleife von oben nach unten)
  - type: loop
    if: "not(isEmpty(zug1.via))"
    value: "{{zug1.via}}"
    split_by: "-"
    var: via
    max_items: 5
    layers:
      - type: image
        file: dot.png
        x: 84
        y: "{{i * 11 + 15}}"
      - type: text
        value: "{{via | trim}}"
        x: 94
        y: "{{i * 11 + 14}}"
        font: regular
        size: 8
        color: "#ffffff"
        align: left

  # Zugnummer — IC-Familie mit Icon (elif-Kette: spezifischstes zuerst)
  - type: image
    if: "startsWith(zug1.nr, 'ICN')"
    file: icn.png
    x: 48
    y: 11
  - type: image
    elif: "startsWith(zug1.nr, 'IC')"
    file: ic.png
    x: 48
    y: 11
  - type: image
    elif: "startsWith(zug1.nr, 'EC')"
    file: ec.png
    x: 43
    y: 11
  - type: image
    elif: "startsWith(zug1.nr, 'IR')"
    file: ir.png
    x: 48
    y: 11
  - type: image
    elif: "startsWith(zug1.nr, 'VAE')"
    file: vae.png
    x: 48
    y: 11
  - type: text
    else: true
    value: "{{zug1.nr}}"
    x: 49
    y: 11
    font: regular
    size: 7
    color: "#ffffff"
    align: left

  # Obere Hälfte auf untere Hälfte spiegeln
  - type: copy
    src_x: 0
    src_y: 0
    src_width: 160
    src_height: 80
    x: 0
    y: 81
