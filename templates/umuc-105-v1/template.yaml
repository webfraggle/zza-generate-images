  # Duplizieren
  # PHP: imagecopy($bg,$bg,0,138,120,18,120,96)  = src(120,18,120,96) → dst(0,138)
  - type: copy
    src_x: 120
    src_y: 18
    src_width: 120
    src_height: 96
    x: 0
    y: 138

  # PHP: imagecopy($bg,$bg,162,138,0,18,77,102) = src(0,18,77,102) → dst(162,138)
  - type: copy
    src_x: 0
    src_y: 18
    src_width: 77
    src_height: 102
    x: 162
    y: 138
