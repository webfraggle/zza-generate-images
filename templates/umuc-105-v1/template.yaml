meta:
  name: "U-Muc 1.05\""
  description: "U-Bahn München, 1.05 Zoll Display"
  author: "christoph"
  version: "1.0"
  canvas:
    width: 240
    height: 240

fonts:
  - id: bold
    file: Roboto-Bold.ttf
  - id: regular
    file: RobotoCondensed-Regular.ttf

layers:
  # Hintergrund
  - type: image
    file: bg.png
    x: 0
    y: 0

  # Uhrzeiger (Stunden) — Bild: 54×54px, Zentrum bei (38,56)
  - type: image
    file: clock-hour.png
    x: 38
    y: 56
    rotate: "{{now.hour | mul(30)}}"

  # Uhrzeiger (Minuten)
  - type: image
    file: clock-minutes.png
    x: 38
    y: 56
    rotate: "{{now.minute | mul(6)}}"

  # Richtungstext
  - type: text
    value: "{{zug1.hinweis}}"
    x: 142
    y: 14
    font: regular
    size: 10
    color: "#ffffff"
    align: left

  # Minuten-Label
  - type: text
    value: "Min."
    x: 222
    y: 14
    font: regular
    size: 10
    color: "#ffffff"
    align: left

  # Gleis
  - type: text
    value: "Gleis {{gleis}}"
    x: 25
    y: 105
    font: bold
    size: 17
    color: "#ffffff"
    align: center

  # --- Zug 1 ---
  - type: image
    if: "equals(zug1.nr, 'U1')"
    file: U1.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U2')"
    file: U2.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U3')"
    file: U3.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U4')"
    file: U4.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U5')"
    file: U5.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U6')"
    file: U6.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U7')"
    file: U7.png
    x: 120
    y: 36
  - type: image
    if: "equals(zug1.nr, 'U8')"
    file: U8.png
    x: 120
    y: 36
  - type: text
    if: "not(startsWith(zug1.nr, 'U'))"
    value: "{{zug1.nr}}"
    x: 121
    y: 39
    font: regular
    size: 12
    color: "#ffffff"
    align: left
  - type: text
    value: "{{zug1.vonnach}}"
    x: 142
    y: 39
    font: regular
    size: 12
    color: "#ffffff"
    align: left
  - type: text
    value: "{{zug1.zeit}}"
    x: 238
    y: 47
    font: regular
    size: 12
    color: "#ffffff"
    align: right

