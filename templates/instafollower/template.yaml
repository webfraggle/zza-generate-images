meta:
  name: "Insta Follower"
  description: "Instagram Follower-Anzeige, 160×160px"
  author: "christoph"
  version: "1.0"
  canvas:
    width: 160
    height: 160

fonts:
  - id: bold
    file: Roboto-Bold.ttf
  - id: regular
    file: Roboto-Regular.ttf

layers:
  # Hintergrund
  - type: image
    file: bg.png
    x: 0
    y: 0

  # Username (rechts oben, klein)
  - type: text
    value: "@{{username}}"
    x: 155
    y: 16
    font: regular
    size: 11
    color: "#ffffff"
    align: right

  # Follower-Anzahl (groß, rechts)
  - type: text
    value: "{{count}}"
    x: 156
    y: 55
    font: bold
    size: 32
    color: "#ffffff"
    align: right

  # Obere Hälfte auf untere Hälfte spiegeln
  - type: copy
    src_x: 0
    src_y: 0
    src_width: 160
    src_height: 80
    x: 0
    y: 80
