meta:
  name: "RhB 1.05\""
  description: "Rhätische Bahn, 1.05 Zoll Display, Pixel-Fonts"
  author: "christoph"
  version: "1.0"
  canvas:
    width: 240
    height: 240

fonts:
  - id: bold
    file: LLPIXEL3.ttf
  - id: small
    file: 04B_03__.TTF

layers:
  # Hintergrund
  - type: image
    file: bg.png
    x: 0
    y: 0

  # Zugnummer (schwarzer Bereich oben links)
  - type: text
    value: "{{zug1.nr}}"
    x: 3
    y: 18
    font: bold
    size: 20
    color: "#000000"
    align: left

  # Zeit + Ziel (gelb)
  - type: text
    value: "{{zug1.zeit}} {{zug1.vonnach}}"
    x: 3
    y: 40
    font: bold
    size: 20
    color: "#ffde00"
    align: left
    max_width: 234

  # Via-Stationen (kleine Pixel-Schrift)
  - type: loop
    if: "not(isEmpty(zug1.via))"
    value: "{{zug1.via}}"
    split_by: "-"
    var: via
    max_items: 4
    layers:
      - type: text
        value: "{{via | trim}}"
        x: "{{i * 45 + 60}}"
        y: 6
        font: small
        size: 10
        color: "#ffde00"
        align: left

  # Obere Hälfte auf untere Hälfte spiegeln
  - type: copy
    src_x: 0
    src_y: 0
    src_width: 240
    src_height: 120
    x: 0
    y: 120
